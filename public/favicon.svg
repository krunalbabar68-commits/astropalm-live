<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Background: Deep Midnight -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0a1e"/>
      <stop offset="50%" style="stop-color:#1a1333"/>
      <stop offset="100%" style="stop-color:#0d1b2a"/>
    </linearGradient>

    <!-- Corner Glows -->
    <radialGradient id="purpleGlow" cx="0%" cy="0%" r="50%">
      <stop offset="0%" style="stop-color:#8b5cf6; stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#8b5cf6; stop-opacity:0"/>
    </radialGradient>
    
    <radialGradient id="cyanGlow" cx="100%" cy="100%" r="50%">
      <stop offset="0%" style="stop-color:#06b6d4; stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#06b6d4; stop-opacity:0"/>
    </radialGradient>

    <radialGradient id="violetGlow" cx="100%" cy="0%" r="50%">
      <stop offset="0%" style="stop-color:#7c3aed; stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#7c3aed; stop-opacity:0"/>
    </radialGradient>

    <radialGradient id="deepBlueGlow" cx="0%" cy="100%" r="50%">
      <stop offset="0%" style="stop-color:#1e1b4b; stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#1e1b4b; stop-opacity:0"/>
    </radialGradient>

    <!-- Main Icon Gradient -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    
    <filter id="mainGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- 1. BASE BACKGROUND -->
  <rect width="512" height="512" fill="url(#bgGradient)"/>
  
  <!-- 2. GLOWING CORNERS -->
  <rect width="512" height="512" fill="url(#purpleGlow)"/>
  <rect width="512" height="512" fill="url(#cyanGlow)"/>
  <rect width="512" height="512" fill="url(#violetGlow)"/>
  <rect width="512" height="512" fill="url(#deepBlueGlow)"/>
  
  <!-- 3. CENTER AMBIENT LIGHT -->
  <circle cx="256" cy="256" r="180" fill="#8b5cf6" opacity="0.1"/>

  <!-- 4. MYSTICAL PALM DESIGN -->
  <g transform="translate(64, 64) scale(0.75)" filter="url(#mainGlow)">
    <!-- Palm Path -->
    <path 
      d="M256 90
         C290 90, 320 110, 330 150
         L340 200
         C355 195, 380 200, 385 235
         C390 265, 375 290, 350 295
         L340 296
         L345 350
         C350 400, 320 450, 256 450
         C192 450, 162 400, 167 350
         L172 296
         L162 295
         C137 290, 122 265, 127 235
         C132 200, 157 195, 172 200
         L182 150
         C192 110, 222 90, 256 90Z"
      fill="none"
      stroke="url(#mainGradient)"
      stroke-width="16"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    
    <!-- All-Seeing Eye Center -->
    <circle cx="256" cy="300" r="30" stroke="url(#mainGradient)" stroke-width="8" fill="none" opacity="0.8"/>
    <circle cx="256" cy="300" r="12" fill="#06b6d4">
       <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Decorative Twinkling Stars -->
  <circle cx="120" cy="120" r="3" fill="#fff" opacity="0.6"/>
  <circle cx="392" cy="150" r="2" fill="#fff" opacity="0.4"/>
  <circle cx="150" cy="400" r="2" fill="#fff" opacity="0.5"/>
  <circle cx="420" cy="420" r="4" fill="#fff" opacity="0.3"/>
</svg>
